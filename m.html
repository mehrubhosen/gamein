<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mehrub's Awesome GTM Practice Site</title>

<style>
/* Background Gradient */
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(120deg, #4e73df, #1cc88a);
    color: #fff;
}

/* Container */
.container {
    max-width: 900px;
    margin: 50px auto;
    text-align: center;
}

/* Cards */
.card {
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 30px;
    margin: 20px 0;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    transition: transform 0.3s;
}
.card:hover {
    transform: scale(1.05);
}

/* Buttons */
button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background-color: white;
    color: #4e73df;
    margin: 10px;
    transition: 0.3s;
}
button:hover {
    background-color: #f8f9fc;
}

/* Input */
input {
    padding: 10px;
    width: 250px;
    border-radius: 5px;
    border: none;
    margin: 10px;
}

/* Heading */
h1, h2 {
    margin-bottom: 15px;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
}
</style>

</head>
<body>

<div class="container">
    <div class="card">
        <h1>🚀 Welcome to Mehrub's Awesome Site</h1>
        <p>Interactive practice website for GTM / GA4 tracking</p>
    </div>

    <div class="card">
        <h2>🎯 Button Click Tracker</h2>
        <button id="clickBtn">Click Me!</button>
        <p>Total Clicks: <span id="count">0</span></p>
    </div>

    <div class="card">
        <h2>📬 Lead Form</h2>
        <form id="leadForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <br>
            <button type="submit">Submit</button>
        </form>
        <p id="message"></p>
    </div>
</div>

<script>
// Button click counter
let count = 0;
document.getElementById("clickBtn").addEventListener("click", function(){
    count++;
    document.getElementById("count").innerText = count;
    console.log("Button clicked"); // GTM can track this
});

// Form submit
document.getElementById("leadForm").addEventListener("submit", function(e){
    e.preventDefault();
    let name = document.getElementById("name").value;
    document.getElementById("message").innerText = "Thanks, " + name + "! We'll contact you soon.";
    console.log("Form submitted"); // GTM can track this
});
</script>

</body>
</html>
