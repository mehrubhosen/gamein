<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mehrub's Awesome 2-Page Site</title>

<style>
/* ===== Global Styles ===== */
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(120deg, #4e73df, #1cc88a);
    color: #fff;
}

.container {
    max-width: 900px;
    margin: 50px auto;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 30px;
    margin: 20px 0;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    transition: transform 0.3s;
}
.card:hover { transform: scale(1.05); }

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background-color: white;
    color: #4e73df;
    margin: 10px;
    transition: 0.3s;
}
button:hover { background-color: #f8f9fc; }

input {
    padding: 10px;
    width: 250px;
    border-radius: 5px;
    border: none;
    margin: 10px;
}

a {
    color: #fff;
    text-decoration: underline;
}

/* ===== Page Sections ===== */
.section {
    display: none;
}

.active {
    display: block;
}
</style>
</head>
<body>

<!-- ===== Navigation ===== -->
<div class="container">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('contact')">Contact</button>
</div>

<!-- ===== Home Section ===== -->
<div class="container section active" id="home">
    <div class="card">
        <h1>🚀 Welcome to Mehrub's Awesome Site</h1>
        <p>Practice GTM & GA4 tracking here!</p>
    </div>

    <div class="card">
        <h2>🎯 Button Click Tracker</h2>
        <button id="clickBtn">Click Me!</button>
        <p>Total Clicks: <span id="count">0</span></p>
    </div>
</div>

<!-- ===== Contact Section ===== -->
<div class="container section" id="contact">
    <div class="card">
        <h1>📬 Lead Form</h1>
        <p>Submit your info below:</p>
        <form id="leadForm">
            <input type="text" id="name" placeholder="Your Name" required><br>
            <input type="email" id="email" placeholder="Your Email" required><br>
            <button type="submit">Submit</button>
        </form>
        <p id="message"></p>
    </div>
</div>

<script>
// ===== Page Navigation =====
function showPage(pageId) {
    document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
}

// ===== Button Click Tracker =====
let count = 0;
document.getElementById("clickBtn").addEventListener("click", function(){
    count++;
    document.getElementById("count").innerText = count;
    console.log("Button clicked");
});

// ===== Form Submit Tracker =====
document.getElementById("leadForm").addEventListener("submit", function(e){
    e.preventDefault();
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    document.getElementById("message").innerText = "Thanks, " + name + "! We'll contact you at " + email + ".";
    console.log("Form submitted");
});
</script>

</body>
</html>
